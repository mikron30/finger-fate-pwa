<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#080808" />
  <meta name="description" content="אפליקציית בחירת אצבעות עם כללי זכייה ידועים מראש." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Finger Fate</title>
</head>
<body>
  <main id="app">
    <!-- מסך המשחק מוצג מיד עם פתיחת האפליקציה. -->
    <section id="gameScreen" class="screen game-screen" aria-label="מסך משחק">
      <button id="settingsHintButton" class="corner-button settings-hint-button" type="button" aria-label="הגדרות">⚙</button>
      <button id="helpButton" class="corner-button help-button" type="button" aria-label="עזרה">?</button>

      <div id="touchSurface" class="touch-surface">
        <div id="startMessage" class="start-message" aria-live="polite">
          הניחו לפחות 2 אצבעות על המסך
        </div>

        <div id="touchLayer" class="touch-layer" aria-hidden="true"></div>

        <!-- בסיום אין מלל או כפתורים: רק צבע הזוכה על כל המסך. -->
        <div id="winnerFill" class="winner-fill hidden" aria-hidden="true"></div>

        <div class="version-label">Finger Fate 2</div>
      </div>
    </section>

    <!-- מסך ההגדרות נסתר ונפתח רק לאחר החזקת אצבע אחת במשך 5 שניות. -->
    <section id="setupScreen" class="screen setup-screen hidden" aria-label="הגדרות משחק">
      <header class="brand">
        <img src="icons/icon.svg" alt="" class="brand-icon" />
        <div>
          <h1>Finger Fate</h1>
          <p>הגדרות בחירת הזוכה</p>
        </div>
      </header>

      <section class="time-card" aria-live="polite">
        <div>
          <span class="eyebrow">הכלל הפעיל לפי השעה</span>
          <strong id="clockText">--:--</strong>
        </div>
        <div class="active-rule">
          <span id="activeRuleIcon" aria-hidden="true">◉</span>
          <div>
            <small id="activeRangeText">00:00–01:00</small>
            <b id="activeRuleText">הראשון שמניח אצבע</b>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>בחר מצב זכייה</h2>
          <span>נשמר אוטומטית</span>
        </div>
        <div id="modeGrid" class="mode-grid" role="radiogroup" aria-label="מצב זכייה"></div>
      </section>

      <details class="schedule-panel">
        <summary>לוח הזכייה לפי שעות</summary>
        <div id="scheduleTable" class="schedule-table"></div>
      </details>

      <section class="options-row" aria-label="אפשרויות">
        <label class="switch-row">
          <span>רטט בזכייה</span>
          <input id="vibrationToggle" type="checkbox" checked />
          <span class="switch" aria-hidden="true"></span>
        </label>
        <label class="switch-row">
          <span>צליל בזכייה</span>
          <input id="soundToggle" type="checkbox" checked />
          <span class="switch" aria-hidden="true"></span>
        </label>
      </section>

      <button id="startButton" class="primary-button" type="button">שמור וחזור למשחק</button>
      <button id="installButton" class="secondary-button hidden" type="button">התקן כאפליקציה בטלפון</button>

      <p class="privacy-note">כדי לפתוח שוב את ההגדרות: החזק אצבע אחת על מסך המשחק במשך 5 שניות.</p>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
